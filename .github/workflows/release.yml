name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión (ej: 0.1.0)'
        required: false
        default: '0.1.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      # server.cjs se genera a partir de server.js antes de empaquetar con pkg
      - name: Compilar server.js → server.cjs
        run: npx esbuild server.js --bundle --platform=node --format=cjs --packages=external --outfile=server.cjs

      # Solo se incluye RV1909 (dominio público) en el release oficial.
      # Las demás versiones son copyright de sus respectivos dueños y no se distribuyen.
      - name: Descargar RV1909 (dominio público)
        run: npm run setup

      - name: Build ejecutable (.exe)
        run: npm run build

      - name: Instalar Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compilar instalador
        run: ISCC installer\obs-bible-overlay.iss
        shell: cmd

      - name: Subir instalador como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: obs-bible-overlay-setup
          path: dist/obs-bible-overlay-setup.exe
          retention-days: 30

      - name: Crear GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/obs-bible-overlay-setup.exe
          generate_release_notes: true
          draft: false
          prerelease: false
