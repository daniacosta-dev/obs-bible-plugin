<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel — Bible Overlay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 10px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #1e1e2e;
      color: #cdd6f4;
      min-width: 260px;
    }

    /* ── Encabezado ── */
    h1 {
      font-size: 13px;
      font-weight: 600;
      margin: 0 0 10px 0;
      color: #89b4fa;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #ws-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f38ba8;
      flex-shrink: 0;
      margin-left: auto;
      transition: background 0.3s;
    }
    #ws-dot.connected { background: #a6e3a1; }

    /* ── Etiquetas y controles ── */
    label {
      display: block;
      margin-bottom: 2px;
      color: #a6adc8;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    select {
      width: 100%;
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 13px;
      margin-bottom: 8px;
      outline: none;
      appearance: none;
    }
    select:focus { border-color: #89b4fa; }
    select:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Lista de versículos ── */
    #verse-list {
      height: 200px;
      overflow-y: auto;
      background: #181825;
      border: 1px solid #45475a;
      border-radius: 6px;
      margin-bottom: 8px;
      scroll-behavior: smooth;
    }
    #verse-list:focus-visible { outline: 2px solid #89b4fa; }

    .verse-item {
      display: flex;
      gap: 7px;
      padding: 6px 8px;
      cursor: pointer;
      border-bottom: 1px solid #1e1e2e;
      line-height: 1.45;
      transition: background 0.1s;
    }
    .verse-item:last-child { border-bottom: none; }
    .verse-item:hover { background: #313244; }
    .verse-item.selected {
      background: #1e3a5f;
      border-left: 3px solid #89b4fa;
    }
    .verse-item.in-session {
      background: #1e2d1e;
      border-left: 3px solid #a6e3a1;
    }
    .verse-item.selected.in-session {
      background: #1a3530;
      border-left: 3px solid #a6e3a1;
    }

    .vnum {
      flex-shrink: 0;
      width: 20px;
      font-size: 10px;
      font-weight: 700;
      color: #585b70;
      padding-top: 2px;
      text-align: right;
    }
    .verse-item.selected .vnum { color: #89b4fa; }
    .verse-item.in-session .vnum { color: #a6e3a1; }

    .vtext {
      font-size: 12px;
      color: #bac2de;
      /* Máximo 2 líneas visibles */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .verse-item.selected .vtext { color: #ffffff; }

    .verse-placeholder {
      padding: 24px 10px;
      text-align: center;
      color: #45475a;
      font-size: 12px;
    }

    /* ── Vista previa ── */
    #verse-preview {
      width: 100%;
      height: 72px;
      background: #181825;
      color: #b4befe;
      border: 1px solid #45475a;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 12px;
      line-height: 1.5;
      resize: none;
      outline: none;
      margin-bottom: 8px;
    }

    /* ── Botones de acción ── */
    .btn-row {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
    }
    button {
      padding: 7px 6px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.15s;
    }
    button:hover:not(:disabled) { filter: brightness(1.15); }
    button:active:not(:disabled) { filter: brightness(0.9); }
    button:disabled { opacity: 0.35; cursor: not-allowed; filter: none; }

    #btn-show  { flex: 1; background: #89b4fa; color: #1e1e2e; }
    #btn-hide  { background: #45475a; color: #cdd6f4; padding: 7px 10px; }
    #btn-add-session {
      background: #313244;
      color: #a6adc8;
      padding: 7px 9px;
      font-size: 14px;
      line-height: 1;
    }
    #btn-add-session.in-session {
      background: #1e2d1e;
      color: #a6e3a1;
    }
    #btn-clear { background: #313244; color: #6c7086; padding: 7px 9px; }

    /* ── Divisor de secciones ── */
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 5px 0;
    }
    .section-title span {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #585b70;
    }
    .btn-link {
      background: none;
      border: none;
      color: #585b70;
      font-size: 11px;
      padding: 0;
      cursor: pointer;
      font-weight: 400;
    }
    .btn-link:hover { color: #f38ba8; filter: none; }

    /* ── Lista de sesión ── */
    #session-list {
      margin-bottom: 10px;
    }

    .session-placeholder {
      padding: 12px 8px;
      text-align: center;
      color: #45475a;
      font-size: 12px;
      background: #181825;
      border: 1px dashed #313244;
      border-radius: 6px;
    }

    .session-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 8px;
      background: #181825;
      border: 1px solid #313244;
      border-radius: 6px;
      margin-bottom: 4px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .session-item:hover { background: #1e2438; border-color: #45475a; }
    .session-item.active { border-color: #89b4fa; background: #1e3a5f; }

    .session-info {
      flex: 1;
      min-width: 0;
    }
    .session-ref {
      font-size: 11px;
      font-weight: 700;
      color: #89b4fa;
      white-space: nowrap;
    }
    .session-text {
      font-size: 11px;
      color: #6c7086;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-play {
      flex-shrink: 0;
      background: #a6e3a1 !important;
      color: #1e1e2e !important;
      border-radius: 4px;
      padding: 3px 7px !important;
      font-size: 11px !important;
      font-weight: 700 !important;
    }
    .btn-remove {
      flex-shrink: 0;
      background: transparent !important;
      color: #45475a !important;
      padding: 3px 5px !important;
      font-size: 13px !important;
      font-weight: 400 !important;
    }
    .btn-remove:hover { color: #f38ba8 !important; }

    .divider { border: none; border-top: 1px solid #313244; margin: 10px 0; }

    /* ── CSS personalizado ── */
    details {
      background: #181825;
      border: 1px solid #313244;
      border-radius: 8px;
      overflow: hidden;
    }
    summary {
      padding: 8px 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      color: #585b70;
      user-select: none;
      list-style: none;
    }
    summary::-webkit-details-marker { display: none; }
    summary::before {
      content: '▶ ';
      font-size: 10px;
      display: inline-block;
      transition: transform 0.2s;
    }
    details[open] summary::before { transform: rotate(90deg); }

    .css-body { padding: 0 10px 10px 10px; }
    #css-input {
      width: 100%;
      height: 110px;
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 6px;
      padding: 6px 8px;
      font-family: 'Consolas', 'Fira Code', monospace;
      font-size: 11px;
      resize: vertical;
      outline: none;
      margin-bottom: 6px;
    }
    #btn-apply-css {
      width: 100%;
      background: #a6e3a1;
      color: #1e1e2e;
      margin-bottom: 8px;
    }
    .presets-label {
      font-size: 11px;
      color: #585b70;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .preset-row { display: flex; flex-direction: column; gap: 4px; }
    .preset-row button {
      background: #313244;
      color: #cdd6f4;
      font-weight: 400;
      font-size: 12px;
      text-align: left;
      padding: 6px 10px;
    }
    .preset-row button:hover { background: #45475a; filter: none; }
  </style>
</head>
<body>

<h1>Bible Overlay <span id="ws-dot" title="Estado WebSocket"></span></h1>

<!-- Selector de libro -->
<label for="sel-book">Libro</label>
<select id="sel-book">
  <option value="">Cargando...</option>
</select>

<!-- Selector de capítulo -->
<label for="sel-chapter">Capítulo</label>
<select id="sel-chapter" disabled>
  <option value="">—</option>
</select>

<!-- Lista de versículos con texto visible -->
<label>Versículos <span id="verse-count" style="color:#45475a;font-weight:400;text-transform:none;letter-spacing:0"></span></label>
<div id="verse-list" tabindex="0">
  <div class="verse-placeholder">Seleccioná un capítulo...</div>
</div>

<!-- Vista previa del versículo seleccionado -->
<label>Vista previa</label>
<textarea id="verse-preview" readonly placeholder="Hacé click en un versículo para previsualizar..."></textarea>

<!-- Botones principales -->
<div class="btn-row">
  <button id="btn-show" disabled>Mostrar ▶</button>
  <button id="btn-hide">Ocultar</button>
  <button id="btn-add-session" disabled title="Agregar a sesión">☆</button>
  <button id="btn-clear" title="Limpiar selección">✕</button>
</div>

<!-- Sesión -->
<div class="section-title">
  <span>Sesión <span id="session-count" style="font-weight:400;color:#45475a"></span></span>
  <button class="btn-link" id="btn-clear-session">Limpiar todo</button>
</div>
<div id="session-list"></div>

<hr class="divider" />

<!-- Personalización de CSS -->
<details>
  <summary>Personalizar CSS</summary>
  <div class="css-body">
    <textarea id="css-input" placeholder=":root { --verse-font-size: 2.8rem; }"></textarea>
    <button id="btn-apply-css">Aplicar en vivo</button>
    <p class="presets-label">Presets</p>
    <div class="preset-row">
      <button id="preset-clasico">Iglesia clásica</button>
      <button id="preset-grande">Texto grande</button>
      <button id="preset-oscuro">Fondo oscuro fuerte</button>
    </div>
  </div>
</details>

<script src="panel.js"></script>
</body>
</html>
